<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karang Taruna - Data</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 40px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 class="text-center mb-4">Data Laporan Keuangan Karang Taruna</h2>
        <p class="text-center text-muted">Data ini dimuat secara otomatis dari file Excel di GitHub.</p>
        
        <div class="table-responsive" id="tabel-container">
            <div class="d-flex justify-content-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
            <p class="text-center mt-2">Memuat data...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <script>
        // Nama file Excel yang ada di repositori Anda
        const EXCEL_FILE_URL = '*.xlsx'; 

        async function muatDataExcel() {
            try {
                // 1. Mengambil file Excel dari GitHub
                const response = await fetch(EXCEL_FILE_URL);
                if (!response.ok) throw new Error("File tidak ditemukan");
                
                const arrayBuffer = await response.arrayBuffer();

                // 2. Membaca file menggunakan SheetJS
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                
                // 3. Mengambil data dari Sheet pertama
                const namaSheetPertama = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[namaSheetPertama];

                // 4. Mengubah data Excel menjadi format tabel HTML
                const htmlTable = XLSX.utils.sheet_to_html(worksheet, { id: "tabel-excel" });

                // 5. Menampilkan tabel ke dalam halaman web
                const container = document.getElementById('tabel-container');
                container.innerHTML = htmlTable;

                // 6. Menambahkan class Bootstrap agar tabel tampil rapi dan responsif
                const tabelElement = document.getElementById('tabel-excel');
                tabelElement.className = "table table-striped table-bordered table-hover mt-3";

            } catch (error) {
                console.error("Gagal memuat Excel:", error);
                document.getElementById('tabel-container').innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        Gagal memuat data Excel. Pastikan file <strong>${EXCEL_FILE_URL}</strong> sudah di-upload ke repositori.
                    </div>`;
            }
        }

        // Jalankan fungsi saat halaman selesai dimuat
        document.addEventListener("DOMContentLoaded", muatDataExcel);
    </script>
</body>
</html>
